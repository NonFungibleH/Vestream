<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Browser favicon. Teal rounded-square with white slabs so the mark
    stays legible on both light and dark browser tabs (Chrome/Safari/
    Firefox all show favicons on tab backgrounds that vary by theme).
    The standalone logo-icon.svg used in-page is the dark-on-light
    variant — this favicon is the always-on-brand variant.
  -->
  <rect width="100" height="100" rx="22" fill="#1CB8B8"/>
  <path d="M22 30 L62 30 L70 38 L22 38 Z" fill="white" opacity="0.45"/>
  <path d="M22 46 L70 46 L78 54 L22 54 Z" fill="white" opacity="0.75"/>
  <path d="M22 62 L78 62 L86 70 L22 70 Z" fill="white"/>
</svg>
