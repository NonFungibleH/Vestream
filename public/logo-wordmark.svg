<svg viewBox="0 0 300 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Wordmark-only variant — no icon. V picks up the teal accent so the
    mark still feels distinctly Vestream-branded even without the slab
    icon to its left.
  -->
  <text
    x="0" y="46"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-size="50"
    font-weight="800"
    letter-spacing="-0.03em"
  >
    <tspan fill="#1CB8B8">V</tspan><tspan fill="#1A1D20">estream</tspan>
  </text>
</svg>
