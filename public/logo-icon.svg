<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Left solid bar segment (vested / past) -->
  <rect x="14" y="47" width="40" height="6" rx="3" fill="white"/>

  <!-- Glow halo around the now-dot -->
  <circle cx="54" cy="50" r="11" fill="white" fill-opacity="0.13"/>

  <!-- Now dot — the present moment -->
  <circle cx="54" cy="50" r="5.5" fill="white"/>

  <!-- Future dots — upcoming unlocks, fading into the distance -->
  <circle cx="65" cy="50" r="3.8" fill="white" fill-opacity="0.72"/>
  <circle cx="74" cy="50" r="2.8" fill="white" fill-opacity="0.46"/>
  <circle cx="81" cy="50" r="2.0" fill="white" fill-opacity="0.26"/>
  <circle cx="86" cy="50" r="1.4" fill="white" fill-opacity="0.13"/>
</svg>
