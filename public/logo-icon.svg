<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Vestream icon</title>
  <!--
    Three cascading slabs — each one wider than the one above. Reads as
    "vested value accumulating over time": the bottom slab is solid teal
    (the present, what's already vested) and the upper slabs fade into
    the past. The right edge of each slab steps forward on the diagonal,
    giving the mark momentum.
  -->
  <path d="M22 30 L62 30 L70 38 L22 38 Z" fill="#1A1D20" opacity="0.35"/>
  <path d="M22 46 L70 46 L78 54 L22 54 Z" fill="#1A1D20" opacity="0.65"/>
  <path d="M22 62 L78 62 L86 70 L22 70 Z" fill="#1CB8B8"/>
</svg>
