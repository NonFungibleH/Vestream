<svg viewBox="0 0 380 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Dark-background variant. The two upper slabs invert to white-on-dark
    so the mark stays legible; the bottom teal slab carries unchanged
    because teal pops on both light and dark backgrounds. Wordmark is
    pure white, single fill.
  -->
  <g transform="scale(0.8)">
    <path d="M22 30 L62 30 L70 38 L22 38 Z" fill="white" opacity="0.35"/>
    <path d="M22 46 L70 46 L78 54 L22 54 Z" fill="white" opacity="0.65"/>
    <path d="M22 62 L78 62 L86 70 L22 70 Z" fill="#1CB8B8"/>
  </g>

  <text
    x="84" y="54"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-size="40"
    font-weight="800"
    letter-spacing="-0.03em"
    fill="white"
  >Vestream</text>
</svg>
